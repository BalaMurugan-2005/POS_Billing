# ─────────────────────────────────────────────────────────────────────────────
# Server
# ─────────────────────────────────────────────────────────────────────────────
server.port=${PORT:8081}
server.servlet.context-path=/api

# ─────────────────────────────────────────────────────────────────────────────
# Database — PostgreSQL via DATABASE_URL (Render managed DB)
# Render sets DATABASE_URL automatically. Format:
#   postgresql://user:password@host:5432/dbname
# ─────────────────────────────────────────────────────────────────────────────
# Local Fallback (The real Render DB is parsed dynamically via DataSourceConfig.java)
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/pos_system}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ─────────────────────────────────────────────────────────────────────────────
# JPA / Hibernate — PostgreSQL dialect
# ─────────────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection pool (HikariCP defaults are fine; tune here if needed)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# ─────────────────────────────────────────────────────────────────────────────
# JWT
# ─────────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET_KEY:change-me-in-production-jwt-secret}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ─────────────────────────────────────────────────────────────────────────────
# Email
# ─────────────────────────────────────────────────────────────────────────────
spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_HOST_USER:}
spring.mail.password=${EMAIL_HOST_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─────────────────────────────────────────────────────────────────────────────
# CORS — comma-separated list set via env variable
# e.g. CORS_ALLOWED_ORIGINS=https://your-react-app.onrender.com
# ─────────────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# ─────────────────────────────────────────────────────────────────────────────
# Logging — stdout only for Render
# ─────────────────────────────────────────────────────────────────────────────
logging.level.com.pos=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# JPA Timezone fix for Render PostgreSQL
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─────────────────────────────────────────────────────────────────────────────
# File Upload
# ─────────────────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─────────────────────────────────────────────────────────────────────────────
# Cache & Actuator
# ─────────────────────────────────────────────────────────────────────────────
spring.cache.type=simple
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never