##############################################################################
# render.yaml — Infrastructure-as-Code for Render.com
# This file is at the ROOT of the GitHub repository (POS_Billing/).
# All services live inside the pos-system/ subfolder.
#
# Deploy order: 1) PostgreSQL  2) Django  3) Spring Boot  4) React
##############################################################################

services:

  # ─────────────────────────────────────────────────────────────────────────
  # 1. Django Backend
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    name: pos-django
    runtime: python
    rootDir: pos-system/backend-django
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --fake-initial --noinput
    startCommand: gunicorn pos_system.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: pos-billing-bjyl.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: pos-postgres
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://pos-frontend.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Spring Boot Backend (Docker — Render has no native Java runtime)
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    name: pos-springboot
    runtime: docker
    rootDir: pos-system/backend-springboot
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pos-postgres
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://pos-frontend.onrender.com
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

  # ─────────────────────────────────────────────────────────────────────────
  # 3. React Frontend (Static Site)
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    name: pos-frontend
    runtime: static
    rootDir: pos-system/frontend
    buildCommand: npm install && chmod +x node_modules/.bin/vite && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://pos-springboot-qr0d.onrender.com/api
      - key: VITE_DJANGO_URL
        value: https://pos-billing-bjyl.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

##############################################################################
# PostgreSQL Managed Database
##############################################################################

databases:
  - name: pos-postgres
    plan: free
    databaseName: pos_system
    user: pos_user
